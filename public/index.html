<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>p.xy Caching Proxy</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  body { margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .header-box { border: 4px solid #000; padding: 8px 12px 6px 12px; display: flex; align-items: flex-start; background: white; z-index: 10; }
  .logo { font-size: 18px; font-weight: bold; margin-right: 15px; margin-top: 3px; }
  .content-area { flex-grow: 1; display: flex; flex-direction: column; }
  .input-row { display: flex; margin-bottom: 4px; }
  .url-input { flex-grow: 1; padding: 2px 4px; border: 1px solid #767676; font-size: 13px; }
  .go-button { margin-left: 5px; padding: 2px 8px; border: 1px solid #767676; background-color: #efefef; font-size: 12px; cursor: pointer; }
  .go-button:hover { background-color: #e0e0e0; }
  .status-text { font-size: 11px; color: #888; }
  .status-text strong { font-weight: bold; color: #666; }
  .workspace { display: flex; flex-grow: 1; background: #fff; overflow: hidden; }
  .viewer-container { flex-grow: 1; display: flex; flex-direction: column; min-width: 200px; }
  iframe { flex-grow: 1; width: 100%; border: none; background: #fcfcfc; }
  
  .resizer {
    width: 6px; background-color: #2c2c2c; cursor: col-resize; display: flex;
    align-items: center; justify-content: center; user-select: none;
  }
  .resizer::after { content: '⋮'; color: #666; font-size: 18px; }
  .resizer:hover, .resizer:active { background-color: #000; }
  
  .asset-log { 
    width: 350px; min-width: 150px; flex-shrink: 0;
    background: #1e1e1e; color: #d4d4d4; overflow-y: auto; 
    font-family: 'Courier New', Courier, monospace; font-size: 11px; padding: 10px; 
  }
  .log-title { color: #fff; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; font-weight: bold; }
  .log-entry { margin-bottom: 4px; word-wrap: break-word; }
  .log-entry .keyword { color: #569cd6; }
  .log-entry .path { color: #ce9178; }
</style>
</head>
<body>

<div class="header-box">
  <div class="logo">p.xy</div>
  <div class="content-area">
    <div class="input-row">
      <input type="text" class="url-input" id="urlInput" value="https://papapedo.cl" placeholder="Enter URL">
      <button class="go-button" id="goBtn">Go</button>
    </div>
    <div class="status-text" id="statusText">Ready &mdash; <strong>Awaiting request</strong></div>
  </div>
</div>

<div class="workspace">
  <div class="viewer-container">
    <iframe id="viewer" src="about:blank"></iframe>
  </div>
  <div class="resizer" id="resizer"></div>
  <div class="asset-log" id="assetLog">
    <div class="log-title">Network / Cache Log</div>
  </div>
</div>

<script>
  const socket = io();
  const input = document.getElementById('urlInput');
  const goBtn = document.getElementById('goBtn');
  const viewer = document.getElementById('viewer');
  const assetLog = document.getElementById('assetLog');
  const statusText = document.getElementById('statusText');
  const resizer = document.getElementById('resizer');

  let isResizing = false;
  resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'col-resize'; viewer.style.pointerEvents = 'none'; });
  window.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const newWidth = document.body.clientWidth - e.clientX;
    if (newWidth > 150 && newWidth < document.body.clientWidth - 200) assetLog.style.width = `${newWidth}px`;
  });
  window.addEventListener('mouseup', () => {
    if (isResizing) { isResizing = false; document.body.style.cursor = 'default'; viewer.style.pointerEvents = 'auto'; }
  });

  function loadUrl() {
    let url = input.value.trim();
    if (!url) return;
    if (!url.startsWith('http')) url = 'https://' + url;
    
    statusText.innerHTML = `Processing request...`;
    assetLog.innerHTML = '<div class="log-title">Network / Cache Log</div>';
    viewer.src = 'about:blank';
    socket.emit('proxy-request', url);
  }

  goBtn.addEventListener('click', loadUrl);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') loadUrl(); });

  socket.on('cached-asset', (data) => {
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `<span class="keyword">${data.original === 'CACHE HIT' ? 'INFO' : 'GET'}</span> <span class="path">${data.proxy}</span>`;
    assetLog.appendChild(div);
    assetLog.scrollTop = assetLog.scrollHeight; 
  });

  socket.on('proxy-complete', (data) => {
    statusText.innerHTML = data.isCachedHit 
      ? `Loaded instantly &mdash; <strong>Valid 5-Minute Cache Hit</strong>`
      : `Fresh fetch completed &mdash; <strong>Cached for next 5 minutes</strong>`;

    viewer.src = data.proxyUrl;
    
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `<br><span class="keyword" style="color:#4ec9b0">DONE!</span> Loading iframe: <span class="path">${data.proxyUrl}</span>`;
    assetLog.appendChild(div);
    assetLog.scrollTop = assetLog.scrollHeight;
  });

  socket.on('proxy-error', (err) => { statusText.innerHTML = `<span style="color:red">Error: ${err}</span>`; });
</script>
</body>
</html>
